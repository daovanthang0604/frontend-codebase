packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - esbuild
  - "@tailwindcss/oxide"
  - unrs-resolver

peerDependencyRules:
  allowedVersions:
    zod: "4"

catalog:
  # React ecosystem
  react: ^19.2.3
  react-dom: ^19.2.3
  "@types/react": ^19.2.7
  "@types/react-dom": ^19.2.3
  react-use: ^17.6.0
  "@tanstack/react-table": ^8.21.3
  "input-otp": ^1.4.2

  # TypeScript
  typescript: 5.9.2

  # Node types
  "@types/node": 20.19.9

  # Form handling
  react-hook-form: 7.80.0
  "@hookform/resolvers": 5.2.2
  zod: 4.4.3

  # Data fetching
  "@tanstack/react-query": 5.101.2

  # UI libraries
  lucide-react: 0.475.0
  next-themes: 0.4.6
  "@base-ui/react": 1.2.0
  "react-aria-components": 1.13.0
  recharts: ^3.2.1

  # Utilities
  usehooks-ts: 3.1.1
  colorjs.io: 0.5.2
  bezier-easing: 2.1.0
  "@radix-ui/colors": 3.0.0
  lodash: 4.17.21
  "@types/lodash": 4.17.20
  class-variance-authority: 0.7.1
  dayjs: 1.11.19
